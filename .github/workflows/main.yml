# Build elfuse and run the lint + analysis suites.
#
# Jobs run in parallel where runner capacity allows:
#   lint          : format/newline/security/cppcheck/dispatch on Linux
#   build-macos   : compile + entitlement check on macOS Apple Silicon
#   tidy-macos    : clang-tidy via `make lint`
#   scan-macos    : LLVM scan-build via `make analyze`
#   infer-macos   : Facebook Infer capture + analyze over the full build
#   runtime-macos : HVF runtime tests on self-hosted Apple Silicon,
#                   including release, ASAN, UBSAN, and TSAN variants,
#                   plus the end-to-end OCI run and image-lifecycle checks
#   oci-conformance : OCI image-layout conformance + cross-tool interop
#                   (crane/skopeo/umoci) on Linux
#   oci-macos     : elfuse-oci darwin build, unit tests, sparsebundle
#                   round-trip, and a run-less image-lifecycle smoke
#   workload-*    : per-image real-workload smokes (python/node/go/jvm/c) that
#                   boot each image under HVF on self-hosted Apple Silicon and
#                   drive its characteristic operations (issue #224)
#
# Runtime and sanitizer tests require Hypervisor.framework, which
# GitHub-hosted macOS runners do not expose. Those tests run on self-hosted
# Apple Silicon runners; the hosted job stops at build.
#
# Within the lint job, all sub-checks run even if an earlier one fails so
# the report shows every problem at once instead of stopping at the first.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

# Cancel in-progress runs for the same PR; keep main runs going.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Lint: formatting + static analysis on a fast Linux runner.
  lint:
    name: Lint (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      # Single source of truth for the apt package list. Used by both the
      # cache key (so unrelated workflow edits don't bust the cache) and
      # the install step.
      LINT_PKGS: clang-format-22 cppcheck shellcheck
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: ~/apt-cache
          key: apt-${{ runner.os }}-${{ env.LINT_PKGS }}

      - name: Add LLVM apt repo (clang-format-22)
        # Place the key in /etc/apt/keyrings and bind it via signed-by so
        # it grants trust only to the LLVM repository, not system-wide.
        run: |
          set -euo pipefail
          sudo install -d -m 0755 /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list

      - name: Install tools
        run: |
          set -euo pipefail
          mkdir -p ~/apt-cache
          sudo apt-get update
          # shellcheck disable=SC2086 -- LINT_PKGS is a space-separated list.
          sudo apt-get install -y -o Dir::Cache::Archives="$HOME/apt-cache" \
            $LINT_PKGS

      - name: Trailing newline
        if: ${{ !cancelled() }}
        run: .ci/check-newline.sh

      - name: clang-format
        if: ${{ !cancelled() }}
        run: .ci/check-format.sh

      - name: Banned APIs / secrets / unsafe pp directives
        if: ${{ !cancelled() }}
        run: .ci/check-security.sh

      - name: shellcheck
        # Scoped to .ci/ and scripts/; tests/ has pre-existing warnings that
        # the repository's own check-format target already surfaces.
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          # git pathspec globs cross '/', so 'scripts/*.sh' covers scripts/ci/ too.
          mapfile -d '' files < <(git ls-files -z -- '.ci/*.sh' 'scripts/*.sh')
          shellcheck --severity=warning "${files[@]}"

      - name: cppcheck
        if: ${{ !cancelled() }}
        run: .ci/check-cppcheck.sh

      - name: Syscall dispatch table consistency
        # The generator validates dispatch.tbl <-> syscall.c on every run;
        # writing to a throwaway path is enough to exercise validate_wrappers().
        if: ${{ !cancelled() }}
        run: python3 scripts/gen-syscall-dispatch.py --output "$RUNNER_TEMP/dispatch.h"

  # Build verification on macOS Apple Silicon (no HVF runtime tests).
  # Hosted runners don't expose Hypervisor.framework, so this job stops at
  # `make elfuse` + entitlement check.
  build-macos:
    name: Build (macOS Apple Silicon)
    runs-on: macos-15
    timeout-minutes: 15
    env:
      GNU_OBJCOPY: /opt/homebrew/opt/binutils/bin/objcopy
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      HOMEBREW_NO_AUTO_UPDATE: 1
      BREW_PKGS: binutils
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Homebrew downloads
        # No restore-keys: a partial match would mask upstream regressions.
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ runner.arch }}-${{ env.BREW_PKGS }}

      - name: Confirm host is arm64
        run: |
          set -euo pipefail
          uname -mrs
          test "$(uname -m)" = "arm64"

      - name: Install GNU objcopy
        # shellcheck disable=SC2086 -- BREW_PKGS is a space-separated list.
        run: |
          set -euo pipefail
          brew install --quiet $BREW_PKGS
          "$GNU_OBJCOPY" --version | head -1

      - name: Build elfuse
        run: |
          set -euo pipefail
          clang --version | head -1
          make elfuse

      - name: Verify HVF entitlement is embedded
        run: |
          set -euo pipefail
          codesign -d --entitlements - build/elfuse 2>&1 \
            | grep -q 'com\.apple\.security\.hypervisor'

      - name: Upload elfuse binary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: elfuse-${{ runner.os }}-${{ runner.arch }}
          path: build/elfuse
          retention-days: 7
          if-no-files-found: warn

  # clang-tidy via `make lint`. Runs in parallel with build/scan jobs.
  # Advisory: .clang-tidy sets WarningsAsErrors='', so findings are logged
  # for review but do not gate the job.
  tidy-macos:
    name: clang-tidy (macOS Apple Silicon)
    runs-on: macos-15
    timeout-minutes: 20
    env:
      GNU_OBJCOPY: /opt/homebrew/opt/binutils/bin/objcopy
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      HOMEBREW_NO_AUTO_UPDATE: 1
      # binutils is needed because make lint depends on the shim_blob.h
      # generated by the assembly + objcopy pipeline.
      BREW_PKGS: binutils llvm
      CLANG_TIDY: /opt/homebrew/opt/llvm/bin/clang-tidy
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ runner.arch }}-${{ env.BREW_PKGS }}

      - name: Install Homebrew packages
        # shellcheck disable=SC2086 -- BREW_PKGS is a space-separated list.
        run: |
          set -euo pipefail
          brew install --quiet $BREW_PKGS
          "$CLANG_TIDY" --version | head -1

      - name: Generate build/dispatch.h, shim_blob.h, version.h
        # `make lint` depends on these generated headers; building the
        # full elfuse binary is unnecessary, so just satisfy the deps.
        run: make build/shim_blob.h build/version.h build/dispatch.h

      - name: clang-tidy (make lint)
        run: make lint

  # LLVM scan-build via `make analyze`. Runs in parallel with build/tidy.
  # Advisory: scan-build's Make target does not pass --status-bugs, so
  # findings appear in logs and in the uploaded HTML report but do not
  # gate the job.
  scan-macos:
    name: scan-build (macOS Apple Silicon)
    runs-on: macos-15
    timeout-minutes: 25
    env:
      GNU_OBJCOPY: /opt/homebrew/opt/binutils/bin/objcopy
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      HOMEBREW_NO_AUTO_UPDATE: 1
      BREW_PKGS: binutils llvm
      LLVM_BIN: /opt/homebrew/opt/llvm/bin
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ runner.arch }}-${{ env.BREW_PKGS }}

      - name: Install Homebrew packages
        # shellcheck disable=SC2086 -- BREW_PKGS is a space-separated list.
        # scan-build has no --version; piping --help into `head -1` makes
        # perl take SIGPIPE on the closed stdout and exit non-zero, which
        # under pipefail fails the step. Just confirm the binary exists.
        run: |
          set -euo pipefail
          brew install --quiet $BREW_PKGS
          test -x "$LLVM_BIN/scan-build"
          "$LLVM_BIN/clang" --version | head -1

      - name: scan-build (make analyze)
        run: |
          set -euo pipefail
          export PATH="$LLVM_BIN:$PATH"
          mkdir -p build/scan-build
          scan-build -o build/scan-build --use-cc="$(command -v clang)" \
            make -B elfuse

      - name: Upload scan-build report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: scan-build-${{ runner.os }}-${{ runner.arch }}
          path: build/scan-build
          retention-days: 7
          if-no-files-found: ignore

  # Facebook Infer over the full elfuse build. Must run on macOS Apple
  # Silicon because the build needs Hypervisor.framework and -arch arm64;
  # Infer captures the real clang invocations, so it sees every TU.
  #
  # Gating (unlike tidy-macos/scan-macos): a separate step turns Infer's
  # report.json into inline ::error:: annotations plus a job summary, then
  # fails the job. Findings surface on the PR instead of a silent exit code,
  # so bugs are pruned at PR time instead of merged.
  infer-macos:
    name: Infer (macOS Apple Silicon)
    runs-on: macos-15
    timeout-minutes: 25
    env:
      GNU_OBJCOPY: /opt/homebrew/opt/binutils/bin/objcopy
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      HOMEBREW_NO_AUTO_UPDATE: 1
      BREW_PKGS: binutils
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ runner.arch }}-${{ env.BREW_PKGS }}

      - name: Install GNU objcopy
        # shellcheck disable=SC2086 -- BREW_PKGS is a space-separated list.
        run: |
          set -euo pipefail
          brew install --quiet $BREW_PKGS
          "$GNU_OBJCOPY" --version | head -1

      - name: Setup Infer
        # infer_version pins the Infer binary; the action itself tracks the v1
        # tag.
        uses: srz-zumix/setup-infer@v1
        with:
          infer_version: v1.3.0

      - name: Infer capture + analyze (make -B elfuse)
        # -B forces a clean rebuild so Infer captures every translation unit.
        # Non-C build steps (shim.S assembly, objcopy) pass through untouched.
        # No --fail-on-issue here: `infer run` must exit 0 so the reporting
        # step below runs and surfaces findings before the job fails.
        # --keep-going tolerates a frontend failure on an odd TU, but that can
        # also mask a total capture miss (wrapper never intercepts clang, 0
        # files analyzed). The count guard fails the job on that silent no-op.
        run: |
          set -euo pipefail
          infer run --keep-going -- make -B elfuse 2>&1 | tee infer-run.log
          n=$(grep -oE 'Found [0-9]+ source file' infer-run.log \
              | grep -oE '[0-9]+' | tail -1 || true)
          echo "Infer captured ${n:-0} source files"
          test "${n:-0}" -gt 0

      - name: Report Infer findings
        # Emit GitHub annotations + a job summary from report.json, then exit
        # non-zero if any finding exists. Runs even when a prior step failed so
        # a partial report is still surfaced.
        if: ${{ !cancelled() }}
        run: python3 scripts/infer-annotate.py infer-out/report.json

      - name: Upload Infer report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: infer-${{ runner.os }}-${{ runner.arch }}
          path: infer-out/report.txt
          retention-days: 7
          if-no-files-found: warn

  runtime-macos:
    name: Runtime (${{ matrix.name }})
    needs: build-macos
    if: >
      github.repository == 'sysprog21/elfuse' &&
      (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: [self-hosted, macOS, arm64]
    # Sanitizer builds run several times slower than the release build, so the
    # job budget and the per-test TEST_TIMEOUT are widened per leg. Without
    # that, a TSAN-slowed guest overruns the 10s default TEST_TIMEOUT and the
    # 20-minute job budget, surfacing as TIMEOUT reds indistinguishable from a
    # real hang.
    timeout-minutes: ${{ matrix.job_timeout }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: Release
            sanitizer: release
            extra_cflags: ''
            asan_options: ''
            ubsan_options: ''
            tsan_options: ''
            test_timeout: ''
            job_timeout: 20
            run_matrix: true
            check_target: check
            brew_pkgs: binutils qemu
          - name: ASAN
            sanitizer: asan
            extra_cflags: -O1 -g -fsanitize=address -fno-omit-frame-pointer
            asan_options: abort_on_error=1:detect_leaks=0
            ubsan_options: ''
            tsan_options: ''
            test_timeout: '30'
            job_timeout: 30
            run_matrix: false
            check_target: check-sanitizer
            brew_pkgs: binutils
          - name: UBSAN
            sanitizer: ubsan
            extra_cflags: -O1 -g -fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer
            asan_options: ''
            ubsan_options: halt_on_error=1:print_stacktrace=1
            tsan_options: ''
            test_timeout: '30'
            job_timeout: 30
            run_matrix: false
            check_target: check-sanitizer
            brew_pkgs: binutils
          - name: TSAN
            sanitizer: tsan
            extra_cflags: -O1 -g -fsanitize=thread -fno-omit-frame-pointer
            asan_options: ''
            ubsan_options: ''
            tsan_options: halt_on_error=1
            test_timeout: '60'
            job_timeout: 45
            run_matrix: false
            check_target: check-sanitizer
            brew_pkgs: binutils

    # contents: read for the checkout; pull-requests: read so the guard can
    # query the PR's current HEAD. (actions: write would let the guard
    # cancel the run instead of failing it, but repo policy caps the token
    # at actions: read, so the guard fails fast with a clear reason instead.)
    permissions:
      contents: read
      pull-requests: read

    concurrency:
      group: runtime-macos-${{ matrix.sanitizer }}-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}

    env:
      LINUX_TOOLCHAIN: /opt/toolchain/aarch64-linux-gnu
      GNU_OBJCOPY: /opt/homebrew/opt/binutils/bin/objcopy
      EXTRA_CFLAGS: ${{ matrix.extra_cflags }}
      ASAN_OPTIONS: ${{ matrix.asan_options }}
      UBSAN_OPTIONS: ${{ matrix.ubsan_options }}
      TSAN_OPTIONS: ${{ matrix.tsan_options }}
      # Empty on the release leg falls back to test-runner.sh's 10s default.
      TEST_TIMEOUT: ${{ matrix.test_timeout }}
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      HOMEBREW_NO_AUTO_UPDATE: 1
      # qemu is only needed by test-matrix (release leg); sanitizer legs run the
      # fixture-free check-sanitizer subset and skip it.
      BREW_PKGS: ${{ matrix.brew_pkgs }}
      # Parallelize compilation; the guest-test cross-compile and elfuse build
      # dominate the non-test wall time.
      MAKEFLAGS: -j8

    steps:
      # Fail fast if this run targets a commit that is no longer the PR's
      # HEAD. cancel-in-progress covers "commit 2 pushed while commit 1 is
      # still running", but NOT a manual "Re-run jobs" on an old run: a
      # re-run replays the original event payload (a frozen head.sha)
      # against this single self-hosted runner, which would otherwise burn
      # the full job timeout re-testing stale code. Compare the frozen
      # head.sha against the live PR HEAD; when they differ, exit 1 with a
      # clear "commit is no longer the latest" message. We fail (rather than
      # cancel) because repo policy caps the token at actions: read, so the
      # cancel API is unavailable. exit 1 also stops the job, so the later
      # steps are skipped automatically -- no per-step guard needed. The
      # lookup fails open: if HEAD can't be determined the job runs.
      - name: Fail fast if superseded by a newer PR commit
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          # curl and system python3 are always present on macOS; jq/gh are
          # not guaranteed on a self-hosted runner, so don't depend on them.
          latest=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["head"]["sha"])') \
            || latest=""
          echo "Run targets : $RUN_SHA"
          echo "PR HEAD now : ${latest:-<unknown>}"
          if [ -n "$latest" ] && [ "$latest" != "$RUN_SHA" ]; then
            echo "::error::This run targets $RUN_SHA, but PR #$PR_NUMBER HEAD is now $latest -- the commit is no longer the latest. Failing instead of re-testing stale code on the self-hosted runner; re-run CI on the current commit."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Restore cached test fixtures
        # Only the release leg needs fixtures: the sanitizer legs run the
        # fixture-free check-sanitizer subset.
        if: ${{ matrix.run_matrix }}
        # actions/checkout's default clean:true runs `git clean -ffdx`, which
        # wipes externals/test-fixtures (gitignored) on this self-hosted
        # runner even though its disk otherwise persists across runs.
        # fetch-fixtures.sh is already idempotent -- it skips re-downloading
        # Alpine packages when externals/test-fixtures/versions.lock still
        # matches -- so stash that tree outside the workspace and restore it
        # here as a real directory. The qemu lane in tests/test-matrix.sh
        # shares the workspace root with the guest over virtio-9p, and a
        # symlink pointing outside that root does not resolve inside the
        # guest, so this must be a real copy, not a symlink.
        run: |
          cache="$HOME/.cache/elfuse-ci/test-fixtures"
          if [ -d "$cache" ]; then
            mkdir -p externals
            rm -rf externals/test-fixtures
            cp -Rc "$cache" externals/test-fixtures
            echo "Restored test fixtures ($(du -sh externals/test-fixtures | cut -f1), lock: $(head -1 externals/test-fixtures/versions.lock 2>/dev/null || echo none))"
          else
            echo "No fixtures cache at $cache; tests fetch on demand"
          fi

      - name: Host info
        run: |
          sw_vers
          uname -a
          uname -m
          sysctl kern.hv_support || true
          test "$(uname -m)" = "arm64"

      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-runtime-${{ runner.os }}-${{ runner.arch }}-${{ env.BREW_PKGS }}

      - name: Install missing Homebrew packages
        run: |
          missing=()

          for pkg in $BREW_PKGS; do
            if ! brew list --formula "$pkg" >/dev/null 2>&1; then
              missing+=("$pkg")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            brew install --quiet "${missing[@]}"
          else
            echo "All Homebrew packages are already installed: $BREW_PKGS"
          fi

      - name: Tool versions
        run: |
          command -v make
          command -v "$GNU_OBJCOPY"
          make -V .MAKE.VERSION 2>/dev/null || true
          "$GNU_OBJCOPY" --version | head -1
          qemu-aarch64 --version | head -1 || true
          python3 --version

      - name: Check Rosetta for Linux
        # Rosetta is exercised only by test-matrix (release leg); the
        # check-sanitizer subset has no x86_64-via-Rosetta tests.
        if: ${{ matrix.run_matrix }}
        run: |
          ROSETTA=/Library/Apple/usr/libexec/oah/RosettaLinux/rosetta

          if [ ! -x "$ROSETTA" ]; then
            echo "::error::Rosetta for Linux runtime was not found at $ROSETTA"
            echo
            echo "Install Rosetta on the self-hosted Mac runner first:"
            echo "  sudo softwareupdate --install-rosetta --agree-to-license"
            echo
            echo "Current /Library/Apple/usr/libexec/oah contents:"
            ls -R /Library/Apple/usr/libexec/oah || true
            exit 1
          fi

          ls -l "$ROSETTA"

      - name: Set up Go
        # Only the release leg runs the OCI run smoke below, which needs the Go
        # toolchain to build build/elfuse-oci.
        if: ${{ matrix.run_matrix }}
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build elfuse
        # make does not track EXTRA_CFLAGS changes, so an object built for one
        # sanitizer must not be reused for another. Checkout already wipes
        # build/ (git clean -ffdx), but clean explicitly so the leg builds from
        # scratch even on a workspace that was not freshly cleaned.
        run: |
          make clean
          make EXTRA_CFLAGS="$EXTRA_CFLAGS" elfuse

      - name: Verify HVF entitlement is embedded
        run: |
          codesign -d --entitlements - build/elfuse 2>&1 \
            | grep -q 'com\.apple\.security\.hypervisor'

      - name: test-hello
        run: |
          make EXTRA_CFLAGS="$EXTRA_CFLAGS" test-hello

      - name: test-multi-vcpu
        run: |
          make EXTRA_CFLAGS="$EXTRA_CFLAGS" test-multi-vcpu

      - name: make check
        # Release runs the full check suite; sanitizer legs run check-sanitizer,
        # a representative internal-implementation subset (the release lane plus
        # test-matrix already cover Linux syscall compatibility).
        run: |
          make EXTRA_CFLAGS="$EXTRA_CFLAGS" ${{ matrix.check_target }}

      - name: OCI run smoke (pull -> sparsebundle -> COW clone -> HVF boot)
        # The only leg that exercises the full default `run` path end to end:
        # pull an image, provision the case-sensitive sparsebundle, COW-clone it,
        # boot the guest under HVF, and propagate its exit status. Release leg
        # only (sanitizer legs skip the fixture/qemu-heavy paths).
        if: ${{ matrix.run_matrix }}
        run: |
          set -euo pipefail
          # Same persistent-disk convention as the fixture cache above:
          # checkout wipes the workspace but this self-hosted runner's disk
          # survives. pull is idempotent per digest, so a warm store skips
          # the image blob downloads (only the manifest HEAD/GET goes
          # out) and the warm sparsebundle cache skips the unpack. env:
          # values don't expand $HOME, so export here instead.
          export ELFUSE_OCI_STORE="$HOME/.cache/elfuse-ci/oci-store"
          make build/elfuse-oci
          scripts/ci/oci-run-smoke.sh

      - name: OCI execution checks (unix sockets, cold/warm boot, dynamic interp)
        # Guest-execution seams the smoke above does not cross: a pathname
        # AF_UNIX socket bound inside the guest with a getsockname
        # round-trip, the cold-provision versus warm re-attach boot path,
        # and an explicit dynamically linked from-image binary. Shares the
        # smoke step's warm store (alpine/debian, plus python:3.12-slim).
        # Release leg only.
        if: ${{ matrix.run_matrix }}
        run: |
          set -euo pipefail
          export ELFUSE_OCI_STORE="$HOME/.cache/elfuse-ci/oci-store"
          make build/elfuse-oci
          scripts/ci/oci-exec-checks.sh

      - name: OCI image lifecycle (pull -> inspect -> list -> run -> rmi -> prune)
        # Walks the whole user-facing image lifecycle on the only leg with
        # HVF. python:3.12-slim adds what the alpine smoke above does not:
        # an --entrypoint override, a glibc dynamically-linked guest, and
        # the teardown half of the lifecycle (see the phase functions in
        # scripts/ci/oci-lifecycle.sh). Separate store from the smoke step
        # so the empty-store assertions are meaningful. Release leg only.
        if: ${{ matrix.run_matrix }}
        env:
          ELFUSE_OCI_STORE: ${{ runner.temp }}/oci-lifecycle-store
          IMG: python:3.12-slim
        run: |
          set -euo pipefail
          # Built by the smoke step above; the make target is idempotent.
          make build/elfuse-oci
          # The seed store lives on the runner's persistent disk (env: does
          # not expand $HOME, so export here instead).
          export ELFUSE_OCI_SEED_STORE="$HOME/.cache/elfuse-ci/oci-seed-store"
          scripts/ci/oci-lifecycle.sh

      - name: Test matrix
        if: ${{ matrix.run_matrix }}
        run: |
          bash tests/test-matrix.sh all

      - name: Upload runtime binary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: elfuse-runtime-${{ matrix.sanitizer }}-${{ runner.os }}-${{ runner.arch }}
          path: build/elfuse
          retention-days: 7
          if-no-files-found: warn

      - name: Save test fixtures cache
        # Persist externals/test-fixtures outside the workspace so the next
        # run's "Restore cached test fixtures" step can skip re-downloading
        # unchanged Alpine packages. Runs even if an earlier step failed, as
        # long as the job wasn't cancelled, so a fixture-unrelated test
        # failure doesn't cost the next run its cache.
        if: ${{ !cancelled() && matrix.sanitizer == 'release' }}
        run: |
          if [ -d externals/test-fixtures ]; then
            cache="$HOME/.cache/elfuse-ci/test-fixtures"
            mkdir -p "$(dirname "$cache")"
            rm -rf "$cache"
            cp -Rc externals/test-fixtures "$cache"
            echo "Saved test fixtures ($(du -sh "$cache" | cut -f1))"
          else
            echo "No externals/test-fixtures to save"
          fi

  # OCI image-layout conformance + cross-tool interop on Linux. elfuse-oci
  # is pure Go (no Hypervisor.framework), so pull/inspect/unpack and the
  # conformance tests run in hosted CI; only `run` needs HVF and is excluded.
  # The on-disk store is the contract: it must be a valid OCI image-layout that
  # crane/skopeo/umoci can read and that agrees with registry truth.
  oci-conformance:
    name: OCI conformance + interop (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # Pinned to elfuse-oci's go-containerregistry version so the crane
      # CLI reads layouts with the same schema handling it writes with.
      GGCR_VERSION: v0.21.7
      # umoci release tag for the interop gate; built from a checkout below.
      UMOCI_VERSION: v0.6.0
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install jq + skopeo
        # skopeo reads our layout via the oci: transport. CI treats it as part
        # of the conformance gate; local runs may omit it and get a skipped
        # interop section from scripts/oci-interop.sh.
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq skopeo

      - name: Install crane + umoci from source
        # crane (registry-truth comparison) and umoci (layout parse) are Go
        # tools; install crane at elfuse-oci's ggcr version where applicable.
        run: |
          set -euo pipefail
          go install github.com/google/go-containerregistry/cmd/crane@${GGCR_VERSION}
          # `go install pkg@version` refuses umoci: its go.mod carries replace
          # directives. Build from a pinned checkout instead, where replace
          # directives apply; a read-only `umoci list --layout` conformance
          # check needs nothing newer.
          git clone --quiet --depth 1 --branch "$UMOCI_VERSION" \
            https://github.com/opencontainers/umoci.git "$RUNNER_TEMP/umoci"
          (cd "$RUNNER_TEMP/umoci" && \
            go build -o "$(go env GOPATH)/bin/umoci" ./cmd/umoci)
          echo "$(go env GOPATH)/bin" >>"$GITHUB_PATH"

      - name: Build elfuse-oci
        # Pure Go target; does not require the C toolchain or HVF.
        run: make build/elfuse-oci

      - name: Go fmt + vet (Linux and darwin cross-check)
        # The Makefile gate, so CI and local runs cannot drift. oci-lint vets
        # native, darwin/arm64, and linux; the darwin pass compile-checks the
        # sparsebundle files (csrun.go, sparsebundle.go, cache_darwin.go)
        # that never build on this Linux runner.
        run: make oci-lint

      - name: CLI lifecycle smoke (pull/list/inspect/unpack/rmi/prune)
        # Exercises the built binary through the same user-facing flow that the
        # Go unit tests model in-process. `run` itself remains covered by Go
        # orchestration tests here and by macOS/HVF runtime jobs. --unpack adds
        # the unpack + cache-reclaiming rmi phase to the shared smoke.
        run: scripts/ci/oci-cli-smoke.sh --unpack

      - name: Go unit + conformance tests (with network pull round-trip)
        # ELFUSE_OCI_NETTEST enables the pull round-trip that re-opens the store
        # with crane's independent layout reader and asserts digest agreement.
        env:
          ELFUSE_OCI_NETTEST: "1"
        run: go test -race ./cmd/elfuse-oci/

      - name: Cross-tool interop (crane + skopeo + umoci)
        # Pulls fixtures, then asserts the on-disk layout is spec-shaped and
        # that available tools read it and agree with registry truth.
        run: scripts/oci-interop.sh

  # Darwin elfuse-oci build + tests on a hosted macOS runner. The default `run`
  # path (csrun.go, sparsebundle.go, cache_darwin.go) only compiles on darwin, so
  # the Linux job above can only cross-vet it; this job actually builds and runs
  # it, and drives the run-less image lifecycle (pull/inspect/list/rmi/prune)
  # through the darwin binary. Hosted runners provide hdiutil + case-sensitive
  # APFS (so the real sparsebundle round-trip runs) even though they lack
  # Hypervisor.framework; the HVF-backed guest boot is covered by the
  # self-hosted runtime-macos job.
  oci-macos:
    name: OCI image CLI (macOS Apple Silicon)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build elfuse-oci
        run: make build/elfuse-oci

      - name: Go unit tests (darwin native)
        # Runs the whole suite on darwin, exercising the sparsebundle/clone seams
        # in csrun/sparsebundle/cache_darwin that the Linux job cannot compile.
        # -race: the darwin concurrency-sensitive code (sweep/provision/clone,
        # cache-removal lock discipline) compiles only here, so this is the only
        # place the race detector ever sees it.
        run: go test -race ./cmd/elfuse-oci/

      - name: Sparsebundle round-trip (hdiutil + case-sensitive APFS)
        # ELFUSE_OCI_DARWIN_CS un-skips the real hdiutil create/attach/detach +
        # case-sensitive APFS sweep; hosted runners have hdiutil and APFS.
        env:
          ELFUSE_OCI_DARWIN_CS: "1"
        run: go test -run TestDarwinCSSweep ./cmd/elfuse-oci/

      - name: CLI lifecycle smoke (pull/inspect/list/rmi/prune, no HVF)
        # The same shared smoke the Linux job drives, but through the darwin
        # binary: everything short of `run` (which needs HVF) works end to
        # end on a hosted runner. Without --unpack every rmi takes the
        # cache-free path (nothing was ever unpacked, no --force involved)
        # that the Linux job's cache-reclaiming flow does not cover. jq
        # ships on the macos-15 image.
        run: scripts/ci/oci-cli-smoke.sh

  # Per-image real-workload jobs (issue #224). Each boots a real image under HVF
  # via `elfuse-oci run` and drives that image's characteristic operations so a
  # code change that breaks any of them is caught on the PR. One job per image;
  # all share .github/actions/hvf-elfuse-setup, which fetches the elfuse binary
  # from build-macos and builds elfuse-oci. `run` needs Hypervisor.framework, so
  # these are self-hosted only. Each keeps a warm per-key store on the runner's
  # persistent disk so only the first run pulls over the network. gcc:14 and
  # eclipse-temurin:21 ship the shadow suite, so they also exercise the unpack
  # setuid/setgid degrade end to end.
  workload-python:
    name: Workload (Python)
    needs: build-macos
    if: >
      github.repository == 'sysprog21/elfuse' &&
      (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: [self-hosted, macOS, arm64]
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    concurrency:
      group: workload-python-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: HVF elfuse setup
        uses: ./.github/actions/hvf-elfuse-setup
      - name: Run python workload
        run: |
          set -euo pipefail
          export ELFUSE_OCI_STORE="$HOME/.cache/elfuse-ci/oci-workload-python"
          scripts/ci/oci-workload.sh python

  workload-node:
    name: Workload (Node)
    needs: build-macos
    if: >
      github.repository == 'sysprog21/elfuse' &&
      (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: [self-hosted, macOS, arm64]
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    concurrency:
      group: workload-node-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: HVF elfuse setup
        uses: ./.github/actions/hvf-elfuse-setup
      - name: Run node workload
        # Includes the HTTP-server phase: the guest binds 127.0.0.1 (elfuse maps
        # sockets to host sockets, no netns), and this step curls it host-side.
        run: |
          set -euo pipefail
          export ELFUSE_OCI_STORE="$HOME/.cache/elfuse-ci/oci-workload-node"
          scripts/ci/oci-workload.sh node

  workload-go:
    name: Workload (Go)
    needs: build-macos
    if: >
      github.repository == 'sysprog21/elfuse' &&
      (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: [self-hosted, macOS, arm64]
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    concurrency:
      group: workload-go-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: HVF elfuse setup
        uses: ./.github/actions/hvf-elfuse-setup
      - name: Run go workload
        run: |
          set -euo pipefail
          export ELFUSE_OCI_STORE="$HOME/.cache/elfuse-ci/oci-workload-go"
          scripts/ci/oci-workload.sh go

  workload-jvm:
    name: Workload (JVM)
    needs: build-macos
    if: >
      github.repository == 'sysprog21/elfuse' &&
      (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: [self-hosted, macOS, arm64]
    # javac + java startup and the compile step run slower than the lighter
    # images, and eclipse-temurin is a large first pull.
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: read
    concurrency:
      group: workload-jvm-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: HVF elfuse setup
        uses: ./.github/actions/hvf-elfuse-setup
      - name: Run jvm workload
        run: |
          set -euo pipefail
          export ELFUSE_OCI_STORE="$HOME/.cache/elfuse-ci/oci-workload-jvm"
          scripts/ci/oci-workload.sh jvm

  workload-c:
    name: Workload (C)
    needs: build-macos
    if: >
      github.repository == 'sysprog21/elfuse' &&
      (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: [self-hosted, macOS, arm64]
    # gcc:14 is the largest first pull and the compile bursts (make + a heavier
    # single TU) dominate the wall time.
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: read
    concurrency:
      group: workload-c-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: HVF elfuse setup
        uses: ./.github/actions/hvf-elfuse-setup
      - name: Run c workload
        run: |
          set -euo pipefail
          export ELFUSE_OCI_STORE="$HOME/.cache/elfuse-ci/oci-workload-c"
          scripts/ci/oci-workload.sh c
